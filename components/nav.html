<!-- Dynamically load TranslateManager script if not present -->
<script>
    if (typeof window.TranslateManager === 'undefined') {
        const script = document.createElement('script');
        script.src = 'js/translateManager.js';
        script.onload = initNavLangToggle;
        document.head.appendChild(script);
    } else {
        initNavLangToggle();
    }

    function initNavLangToggle() {
        const toggleBtn = document.getElementById('lang-toggle-btn');
        const krLabel = document.getElementById('lang-kr-label');
        const jpLabel = document.getElementById('lang-jp-label');

        function updateLangUI(lang) {
            if (lang === 'ko') {
                krLabel.classList.replace('text-textmuted', 'text-accent');
                jpLabel.classList.replace('text-accent', 'text-textmuted');
            } else {
                jpLabel.classList.replace('text-textmuted', 'text-accent');
                krLabel.classList.replace('text-accent', 'text-textmuted');
            }
        }

        // 초기 UI 반영
        if(window.TranslateManager) {
            updateLangUI(window.TranslateManager.getLang());
        }

        toggleBtn.addEventListener('click', () => {
            if(window.TranslateManager) {
                const newLang = window.TranslateManager.toggleLang();
                updateLangUI(newLang);
                console.log("Language changed to:", newLang);
            }
        });

        window.addEventListener('aitomo_lang_changed', (e) => {
            updateLangUI(e.detail);
        });
    }
</script>

<script>
    // 활성 메뉴 하이라이팅 스크립트 적용
    setTimeout(() => {
        const path = window.location.pathname.split('/').pop() || '';
        const pageMappers = {
            '': ['nav-home', 'tab-home'],
            'index.html': ['nav-home', 'tab-home'],
            'qna.html': ['nav-qna', 'tab-qna'],
            'dongnae.html': ['nav-dongnae', 'tab-dongnae'],
            'suggestion.html': ['nav-suggestion', 'tab-suggestion'],
            'wiki.html': ['nav-wiki', 'tab-wiki']
        };
        const activeIds = pageMappers[path];
        if (activeIds) {
            activeIds.forEach(id => {
                const el = document.getElementById(id);
                if(el){
                    el.classList.remove('text-textdim', 'text-textmuted');
                    el.classList.add('text-accent', 'font-black');
                    const icon = el.querySelector('iconify-icon');
                    if(icon) {
                        icon.setAttribute('icon', icon.getAttribute('icon').replace('-linear', '-bold').replace('-line-duotone', '-bold-duotone'));
                    }
                }
            });
        }
    }, 100);

    // PWA Install Logic
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        
        // Show UI
        const installBtn = document.getElementById('pwa-install-btn');
        const floatingCard = document.getElementById('pwa-floating-card');
        const closeBtn = document.getElementById('pwa-close-btn');
        const popupInstallBtn = document.getElementById('pwa-popup-install-btn');

        if (installBtn) {
            installBtn.classList.remove('hidden');
            installBtn.classList.add('flex');
        }

        // Check if user previously closed the popup within 24 hours
        let showPopup = true;
        const closedTimeStr = localStorage.getItem('pwa_popup_closed_time');
        if (closedTimeStr) {
            const closedTime = parseInt(closedTimeStr, 10);
            const now = new Date().getTime();
            // 하루(24시간) = 86,400,000 밀리초
            if (now - closedTime < 86400000) {
                showPopup = false;
            } else {
                // 하루가 지났으면 캐시 클리어
                localStorage.removeItem('pwa_popup_closed_time');
            }
        }

        if (showPopup && floatingCard) {
            floatingCard.classList.remove('hidden');
            // 애니메이션을 위해 약간의 딜레이 후 클래스 추가
            setTimeout(() => {
                floatingCard.classList.add('pwa-visible');
            }, 100);
        }

        const doInstall = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                if(floatingCard) floatingCard.classList.add('hidden');
                if(installBtn) installBtn.classList.add('hidden');
            }
            deferredPrompt = null;
        };

        if (installBtn) installBtn.addEventListener('click', doInstall);
        if (popupInstallBtn) popupInstallBtn.addEventListener('click', doInstall);

        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                floatingCard.classList.remove('pwa-visible');
                setTimeout(() => floatingCard.classList.add('hidden'), 500);
                // 현재 시간을 밀리초로 저장
                localStorage.setItem('pwa_popup_closed_time', new Date().getTime().toString());
            });
        }
    });

    // PWA Installed Callback
    window.addEventListener('appinstalled', () => {
        const installBtn = document.getElementById('pwa-install-btn');
        const floatingCard = document.getElementById('pwa-floating-card');
        if (installBtn) installBtn.classList.add('hidden');
        if (floatingCard) floatingCard.classList.add('hidden');
        deferredPrompt = null;
    });
</script>
