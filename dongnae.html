<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>동네꿀팁 - WIKI MOM</title>
    
    <!-- CSS / Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FFF5F5',
                        branddark: '#FFE4E4',
                        accent: '#FF6B6B',
                        textmain: '#2D3748',
                        textmuted: '#718096',
                        wbg: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- [네이버 지도 API] 여기에 네이버 지도 Client ID를 입력하세요 -->
    <!-- <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script> -->
</head>
<body class="bg-wbg font-sans text-textmain antialiased selection:bg-accent/20">

    <!-- Header Navigation (공통) -->
    <div id="nav-container"></div>
    <script>
        fetch('components/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-container').innerHTML = data;
                // 스크립트 태그 재실행
                const scripts = document.getElementById('nav-container').getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    eval(scripts[i].innerText);
                }
            });
    </script>

    <main class="w-full h-[100dvh] pt-[60px] pb-[64px] md:pt-[72px] md:pb-0 flex flex-col relative">
        
        <!-- 카테고리 필터 탭 -->
        <div class="w-full bg-white border-b border-black/5 z-10 sticky top-[60px] md:top-[72px] shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-3 flex gap-3 overflow-x-auto no-scrollbar snap-x">
                <button class="snap-start shrink-0 px-4 py-1.5 rounded-full bg-black text-white text-sm font-bold shadow-md transition-transform hover:scale-105">전체</button>
                <button class="snap-start shrink-0 px-4 py-1.5 rounded-full bg-white border border-black/10 text-textmuted text-sm font-bold shadow-sm transition-transform hover:scale-105 hover:border-black/30 flex items-center gap-1.5">
                    <iconify-icon icon="solar:trees-linear" class="text-[#5BA85B]"></iconify-icon> 놀이터
                </button>
                <button class="snap-start shrink-0 px-4 py-1.5 rounded-full bg-white border border-black/10 text-textmuted text-sm font-bold shadow-sm transition-transform hover:scale-105 hover:border-black/30 flex items-center gap-1.5">
                    <iconify-icon icon="solar:hospital-linear" class="text-[#E05555]"></iconify-icon> 병원
                </button>
                <button class="snap-start shrink-0 px-4 py-1.5 rounded-full bg-white border border-black/10 text-textmuted text-sm font-bold shadow-sm transition-transform hover:scale-105 hover:border-black/30 flex items-center gap-1.5">
                    <iconify-icon icon="solar:chef-hat-linear" class="text-[#E87D3E]"></iconify-icon> 맛집
                </button>
                <button class="snap-start shrink-0 px-4 py-1.5 rounded-full bg-white border border-black/10 text-textmuted text-sm font-bold shadow-sm transition-transform hover:scale-105 hover:border-black/30 flex items-center gap-1.5">
                    <iconify-icon icon="solar:buildings-linear" class="text-[#8B6FD6]"></iconify-icon> 어린이집
                </button>
                <button class="snap-start shrink-0 px-4 py-1.5 rounded-full bg-white border border-black/10 text-textmuted text-sm font-bold shadow-sm transition-transform hover:scale-105 hover:border-black/30 flex items-center gap-1.5">
                    <iconify-icon icon="solar:star-linear" class="text-[#D97DB0]"></iconify-icon> 미용/피부
                </button>
            </div>
        </div>

        <!-- 지도 컨테이너 -->
        <div class="flex-1 relative bg-gray-200">
            <!-- 네이버 지도 SDK가 렌더링될 타겟 엘리먼트 -->
            <div id="map" class="w-full h-full bg-gray-100 flex items-center justify-center text-textmuted text-sm">
                지도를 불러오는 중입니다...<br/>(API 키 등록 필요)
            </div>

            <!-- 현재 위치 버튼 -->
            <button class="absolute bottom-6 right-4 md:right-6 bg-white p-3 rounded-full shadow-lg border border-black/5 hover:bg-gray-50 transition-colors z-20">
                <iconify-icon icon="solar:target-linear" class="text-2xl text-textmain"></iconify-icon>
            </button>

            <!-- 랭킹 오버레이 위젯 -->
            <div class="absolute top-4 left-4 md:left-6 right-4 md:right-auto md:w-[320px] bg-white/90 backdrop-blur-md rounded-2xl shadow-xl border border-white p-4 z-20">
                <div class="flex items-center justify-between cursor-pointer" onclick="document.getElementById('ranking-list').classList.toggle('hidden')">
                    <h3 class="font-extrabold flex items-center gap-1.5 text-textmain">
                        <iconify-icon icon="solar:ranking-bold-duotone" class="text-yellow-500 text-xl"></iconify-icon> 주변 인기 꿀팁 TOP 3
                    </h3>
                    <iconify-icon icon="solar:alt-arrow-down-linear" class="text-textmuted"></iconify-icon>
                </div>
                <!-- 아코디언 리스트 -->
                <div id="ranking-list" class="hidden mt-3 flex flex-col gap-2">
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border border-black/5">
                        <div class="flex items-center gap-2">
                            <span class="font-black text-accent text-sm w-4 text-center">1</span>
                            <span class="font-bold text-sm text-textmain truncate max-w-[120px]">꿈나무 놀이터</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs font-bold text-textmuted">
                            <span class="bg-[#5BA85B]/10 text-[#5BA85B] px-1.5 py-0.5 rounded">놀이터</span>
                            <span class="flex items-center gap-0.5 text-accent"><iconify-icon icon="solar:heart-bold"></iconify-icon> 41</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border border-black/5">
                        <div class="flex items-center gap-2">
                            <span class="font-black text-gray-500 text-sm w-4 text-center">2</span>
                            <span class="font-bold text-sm text-textmain truncate max-w-[120px]">튼튼 소아과</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs font-bold text-textmuted">
                            <span class="bg-[#E05555]/10 text-[#E05555] px-1.5 py-0.5 rounded">병원</span>
                            <span class="flex items-center gap-0.5 text-accent"><iconify-icon icon="solar:heart-bold"></iconify-icon> 28</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </main>

    <!-- FAB: 제보하기 버튼 -->
    <button class="fixed bottom-20 md:bottom-8 right-4 md:right-8 bg-black hover:bg-gray-800 text-white px-5 py-4 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.2)] font-extrabold flex items-center gap-2 transition-transform hover:scale-105 active:scale-95 z-50 group">
        <iconify-icon icon="solar:pen-new-square-linear" class="text-2xl group-hover:rotate-12 transition-transform"></iconify-icon>
        <span class="hidden md:inline">꿀팁 제보하기</span>
    </button>

    <!-- Firebase DataService 연동 스크립트 -->
    <script type="module" src="js/dataService.js"></script>
    <script>
        // Phase 1: 기본 구조 테스트
        window.addEventListener('DataServiceReady', async () => {
            console.log("동네꿀팁 데이터 서비스 준비 완료");
            // 로드 테스트
            // const tips = await window.DataService.getTips();
            // console.log("불러온 꿀팁 수:", tips.length);
        });
    </script>
</body>
</html>
